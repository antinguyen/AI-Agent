name: Live Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Base URL of deployed app (e.g. http://192.168.1.200)
        required: true
        type: string
      username:
        description: Login username
        required: false
        default: admin1
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run live smoke
        env:
          BASE_URL: ${{ inputs.base_url }}
          USERNAME: ${{ inputs.username }}
          PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        run: |
          chmod +x scripts/smoke/live-smoke.sh
          scripts/smoke/live-smoke.sh