spring:
  application:
    name: sales-management
  datasource:
    url: jdbc:h2:mem:salesdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m
  h2:
    console:
      enabled: true
      path: /h2-console
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    # Base64-encoded secret (>=256 bits). Replace with a strong random value in production.
    secret: c2VjcmV0LWp3dC1rZXktZm9yLXNhbGVzLW1hbmFnZW1lbnQtc3lzdGVtLTIwMjYtbXVzdC1iZS1sb25n
    expiration-ms: 86400000  # 24 hours
  mail:
    admin-email: ${ADMIN_EMAIL:admin@salesapp.com}
  rate-limit:
    auth:
      max-requests: ${RATE_LIMIT_MAX:10}
      window-seconds: ${RATE_LIMIT_WINDOW:60}
  upload:
    base-dir: ${APP_UPLOAD_BASE_DIR:uploads}
